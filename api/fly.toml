app = "cerebras-asset-api"
primary_region = "sjc"

[build]

[env]
  PORT = "8080"
  HOST = "0.0.0.0"
  NODE_ENV = "production"
  API_DATA_DIR = "/app/data"

[[mounts]]
  source = "asset_data"
  destination = "/app/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
